<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not a Robot</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f4f8;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #fff;
      border: 1px solid #d1d9e0;
      border-radius: 8px;
      padding: 24px 32px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-row input[type="checkbox"] {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: #2c7be5;
      flex-shrink: 0;
    }

    .checkbox-row label {
      font-size: 16px;
      color: #333;
      cursor: pointer;
    }

    .thank-you {
      display: none;
      margin-top: 20px;
      font-size: 18px;
      color: #2c7be5;
      font-weight: bold;
    }

    .thank-you.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkbox-row">
      <input type="checkbox" id="notRobot" />
      <label for="notRobot">I am not a robot</label>
    </div>
    <p class="thank-you" id="thankYou">Thank you! 🎉</p>
  </div>

  <script>
    document.getElementById('notRobot').addEventListener('change', function () {
      const msg = document.getElementById('thankYou');
      if (this.checked) {
        msg.classList.add('visible');
      } else {
        msg.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
